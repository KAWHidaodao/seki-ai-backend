<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FourMeme Map</title>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; font-family: monospace; }
    #canvas { display: block; }
    #stats { position: fixed; top: 20px; left: 20px; color: #0ff; font-size: 14px; z-index: 10; }
    #stats div { margin: 5px 0; text-shadow: 0 0 10px #0ff; }
  </style>
</head>
<body>
  <div id="stats">
    <div>TOKENS: 0</div>
    <div>VOLUME: $0M</div>
    <div>USERS: 0</div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    let scene, camera, renderer, particles;
    
    function init() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 50;
      
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);
      
      createParticles();
      animate();
      
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }
    
    function createParticles() {
      const geometry = new THREE.BufferGeometry();
      const positions = [];
      const colors = [];
      
      for (let i = 0; i < 500; i++) {
        positions.push((Math.random() - 0.5) * 100);
        positions.push((Math.random() - 0.5) * 100);
        positions.push((Math.random() - 0.5) * 100);
        
        const color = new THREE.Color();
        color.setHSL(Math.random() * 0.3 + 0.5, 1, 0.5);
        colors.push(color.r, color.g, color.b);
      }
      
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
      
      const material = new THREE.PointsMaterial({ size: 2, vertexColors: true, transparent: true, opacity: 0.8 });
      particles = new THREE.Points(geometry, material);
      scene.add(particles);
    }
    
    function animate() {
      requestAnimationFrame(animate);
      particles.rotation.y += 0.001;
      particles.rotation.x += 0.0005;
      renderer.render(scene, camera);
    }
    
    init();
  </script>
</body>
</html>
