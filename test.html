<!DOCTYPE html>
<html>
<head><style>body{background:#000;color:#fff}</style></head>
<body>
<button onclick="G('a')">A页</button>
<button onclick="G('b')">B页</button>
<div id="page-a" style="display:block">A页内容，高度应该正常</div>
<div id="page-b" style="display:none">B页内容，高度应该正常</div>
<script>
function G(id){
  document.querySelectorAll('[id^=page-]').forEach(p=>{p.style.display='none';});
  var pg=document.getElementById('page-'+id);
  if(pg){pg.style.display='block';}
  console.log('after G, rect:', document.getElementById('page-'+id).getBoundingClientRect());
}
</script>
</body>
</html>
